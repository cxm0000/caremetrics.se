<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60" role="img" aria-labelledby="cm-logo-title cm-logo-desc">
  <title id="cm-logo-title">CareMetrics</title>
  <desc id="cm-logo-desc">CareMetrics logo for dark backgrounds</desc>

  <!-- Icon block -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="36" height="36" rx="4"
          fill="none"
          stroke="#22D3EE"
          stroke-width="2" />
    <rect x="14" y="14" width="36" height="36" rx="4"
          fill="#14B8A6"
          fill-opacity="0.7" />
    <rect x="8" y="8" width="36" height="36" rx="4"
          fill="#0B1120"
          fill-opacity="0.7" />
    <circle cx="26" cy="26" r="4.5" fill="#22D3EE" />
  </g>

  <!-- Wordmark for dark background -->
  <g transform="translate(64,38)">
    <text x="0" y="0"
          font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22"
          font-weight="700"
          letter-spacing="-0.04em">
      <tspan fill="#E5E7EB">Care</tspan><tspan fill="#2DD4BF">Metrics</tspan>
    </text>
  </g>
</svg>

