<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cm-favicon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="url(#cm-favicon-bg)" />

  <!-- Stacked-square CareMetrics icon, simplified for 16x16 -->
  <g transform="translate(30,28)">
    <rect x="0" y="0" width="32" height="32" rx="4"
          fill="none"
          stroke="#22D3EE"
          stroke-width="2" />
    <rect x="10" y="10" width="30" height="30" rx="4"
          fill="#14B8A6"
          fill-opacity="0.7" />
    <rect x="6" y="6" width="30" height="30" rx="4"
          fill="#0B1120"
          fill-opacity="0.7" />
    <circle cx="22" cy="22" r="4" fill="#22D3EE" />
  </g>
</svg>

